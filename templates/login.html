<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-hover: #3a56d4;
            --secondary-color: #f8f9fa;
            --text-color: #2b2d42;
            --light-gray: #e9ecef;
            --border-radius: 12px;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
            line-height: 1.6;
        }
        
        .card {
            width: 100%;
            max-width: 420px;
            border-radius: var(--border-radius);
            border: none;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--box-shadow);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        
        .card-header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1.5rem;
            border-bottom: none;
        }
        
        .card-header h3 {
            font-weight: 600;
            margin: 0;
            font-size: 1.8rem;
        }
        
        .card-body {
            padding: 2rem;
            background-color: white;
        }
        
        .form-label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--light-gray);
            transition: var(--transition);
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.25);
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-radius: 8px;
            transition: var(--transition);
        }
        
        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .nav-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .text-center a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .text-center a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
        
        /* Animation for form elements */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card-body > * {
            animation: fadeIn 0.6s ease forwards;
        }
        
        .card-body > *:nth-child(1) { animation-delay: 0.1s; }
        .card-body > *:nth-child(2) { animation-delay: 0.2s; }
        .card-body > *:nth-child(3) { animation-delay: 0.3s; }
        .card-body > *:nth-child(4) { animation-delay: 0.4s; }
        .card-body > *:nth-child(5) { animation-delay: 0.5s; }
        
        /* Alert animations */
        .alert {
            animation: slideIn 0.3s ease forwards;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        /* Responsive adjustments */
        @media (max-width: 576px) {
            .card {
                margin: 0 1rem;
            }
            
            .card-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="nav-buttons">
        <a href="/history" class="btn btn-outline-primary">View History</a>
    </div>
    <div class="card shadow">
        <div class="card-header">
            <h3 class="mb-0">Welcome Back</h3>
        </div>
        <div class="card-body">
            <!-- Flash messages container -->
            <div id="flashMessages"></div>
            
            <!-- Error message container for JavaScript validation -->
            <div id="errorMessage" class="alert alert-danger d-none"></div>

            <form id="loginForm" method="POST" action="#">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="Enter your username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary py-2" id="loginBtn">
                        <span class="normal-state">Login</span>
                        <span class="loading-state d-none">
                            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                            Logging in...
                        </span>
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="mb-2">Don't have an account? <a href="/register">Sign up</a></p>
                <a href="#" class="text-muted">Forgot password?</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get DOM elements
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorElement = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const normalState = loginBtn.querySelector('.normal-state');
            const loadingState = loginBtn.querySelector('.loading-state');
            const flashMessages = document.getElementById('flashMessages');

            // Function to show loading state
            function setLoading(isLoading) {
                if (isLoading) {
                    normalState.classList.add('d-none');
                    loadingState.classList.remove('d-none');
                    loginBtn.disabled = true;
                } else {
                    normalState.classList.remove('d-none');
                    loadingState.classList.add('d-none');
                    loginBtn.disabled = false;
                }
            }

            // Function to show error message
            function showError(message) {
                errorElement.classList.remove('d-none');
                errorElement.textContent = message;
                
                // Auto hide after 5 seconds
                setTimeout(() => {
                    errorElement.classList.add('d-none');
                }, 5000);
            }

            // Function to show success flash message
            function showFlashMessage(message, type = 'success') {
                const alertDiv = document.createElement('div');
                alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
                alertDiv.role = 'alert';
                alertDiv.innerHTML = `
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                `;
                flashMessages.appendChild(alertDiv);
                
                // Auto dismiss after 3 seconds
                setTimeout(() => {
                    alertDiv.remove();
                }, 3000);
            }

            // Clear error when user starts typing
            usernameInput.addEventListener('input', function() {
                errorElement.classList.add('d-none');
            });
            
            passwordInput.addEventListener('input', function() {
                errorElement.classList.add('d-none');
            });

            // Handle form submission
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
                const rememberMe = document.getElementById('rememberMe').checked;
                
                console.log('=== Login Form Submitted ===');
                console.log('Username:', username);
                console.log('Remember Me:', rememberMe);
                
                // Validate inputs
                if (!username || !password) {
                    showError('Please fill in all fields');
                    return;
                }
                
                // Show loading state
                setLoading(true);
                
                // Create form data for submission
                const formData = new URLSearchParams({
                    'username': username,
                    'password': password
                });
                
                console.log('Sending login request...');
                
                // Submit to Flask backend
                fetch('/login', {
                    method: 'POST',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData,
                    credentials: 'same-origin'  // Important: include cookies/session
                })
                .then(async response => {
                    console.log('Response received:');
                    console.log('- Status:', response.status);
                    console.log('- Status Text:', response.statusText);
                    console.log('- Headers:', Object.fromEntries([...response.headers]));
                    
                    const contentType = response.headers.get('content-type');
                    console.log('- Content-Type:', contentType);
                    
                    let data;
                    if (contentType && contentType.includes('application/json')) {
                        data = await response.json();
                    } else {
                        const text = await response.text();
                        console.log('- Response text:', text.substring(0, 200) + '...');
                        throw new Error('Expected JSON response but got HTML');
                    }
                    
                    console.log('- Data:', data);
                    
                    if (!response.ok) {
                        throw new Error(data.message || `HTTP error! status: ${response.status}`);
                    }
                    
                    return data;
                })
                .then(data => {
                    console.log('Processing response data:', data);
                    
                    if (data.success) {
                        console.log('✅ Login successful!');
                        console.log('- Redirect URL:', data.redirect);
                        console.log('- Session data:', data.session);
                        
                        // Show success message
                        showFlashMessage('Login successful! Redirecting...', 'success');
                        
                        // Redirect to dashboard
                        setTimeout(() => {
                            window.location.href = data.redirect;
                        }, 500);
                    } else {
                        console.log('❌ Login failed:', data.message);
                        setLoading(false);
                        showError(data.message || 'Invalid username or password');
                    }
                })
                .catch(error => {
                    console.error('❌ Login error:', error);
                    console.error('Error details:', error.message);
                    
                    setLoading(false);
                    
                    if (error.message.includes('Failed to fetch')) {
                        showError('Cannot connect to server. Please check your connection.');
                    } else if (error.message.includes('Expected JSON')) {
                        showError('Server error. Please try again later.');
                    } else {
                        showError(error.message || 'Login failed. Please try again.');
                    }
                });
            });

            // Check for any flash messages from Flask on page load
            const urlParams = new URLSearchParams(window.location.search);
            const flashed = urlParams.get('flashed');
            
            if (flashed) {
                showFlashMessage(flashed, 'info');
            }

            // Add CSRF token if your app uses it
            // You can add a meta tag with CSRF token and include it in requests

            console.log('Login page initialized');
        });
    </script>
</body>
</html>
